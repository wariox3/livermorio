name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (staging)
        if: github.ref == 'refs/heads/dev'
        run: npm run build -- --configuration=staging

      - name: Build (prod)
        if: github.ref == 'refs/heads/main'
        run: npm run build

      - name: Set deploy variables (dev)
        if: github.ref == 'refs/heads/dev'
        run: |
          echo "SSH_KEY_SECRET=DEV_SSH_KEY" >> $GITHUB_ENV
          echo "DEPLOY_HOST=${{ secrets.DEV_HOST }}" >> $GITHUB_ENV
          echo "DEPLOY_USER=${{ secrets.DEV_SSH_USER }}" >> $GITHUB_ENV
          echo "DEPLOY_PATH=${{ secrets.DEV_DEPLOY_PATH }}" >> $GITHUB_ENV

      - name: Set deploy variables (prod)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "SSH_KEY_SECRET=PROD_SSH_KEY" >> $GITHUB_ENV
          echo "DEPLOY_HOST=${{ secrets.PROD_HOST }}" >> $GITHUB_ENV
          echo "DEPLOY_USER=${{ secrets.PROD_SSH_USER }}" >> $GITHUB_ENV
          echo "DEPLOY_PATH=${{ secrets.PROD_DEPLOY_PATH }}" >> $GITHUB_ENV

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          if [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            echo "${{ secrets.DEV_SSH_KEY }}" > ~/.ssh/deploy_key
          else
            echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/deploy_key
          fi
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Validate deploy path
        run: |
          if [[ "$DEPLOY_PATH" == "/var/www/html" || "$DEPLOY_PATH" == "/var/www" || -z "$DEPLOY_PATH" ]]; then
            echo "ERROR: DEPLOY_PATH '$DEPLOY_PATH' is too broad. Must include a project subdirectory."
            exit 1
          fi

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            dist/portal/browser/ \
            ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:${{ env.DEPLOY_PATH }}/

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
