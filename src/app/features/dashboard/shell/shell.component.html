<div class="shell-layout">
  <!-- Navbar -->
  <header class="shell-navbar">
    <div class="navbar-start">
      <p-button
        icon="pi pi-bars"
        [text]="true"
        severity="secondary"
        class="hamburger-btn"
        (onClick)="toggleDrawer()"
        aria-label="Abrir menú"
      />
      <span class="navbar-logo">Semantica</span>
    </div>

    <div class="navbar-end">
      @if (currentUser()) {
        <p-avatar
          [label]="currentUser()!.email.charAt(0).toUpperCase()"
          shape="circle"
          size="normal"
          class="user-avatar"
        />
        <span class="user-name">{{ currentUser()!.email }}</span>
      }
      <p-button
        label="Cerrar sesión"
        icon="pi pi-sign-out"
        [text]="true"
        severity="secondary"
        (onClick)="logout()"
      />
    </div>
  </header>

  <div class="shell-body">
    <!-- Sidebar desktop -->
    <aside class="shell-sidebar">
      <nav class="sidebar-nav">
        @for (item of navItems; track item.route) {
          <a
            class="nav-item"
            [routerLink]="item.route"
            routerLinkActive="active"
          >
            <i [class]="item.icon"></i>
            <span>{{ item.label }}</span>
          </a>
        }
      </nav>
    </aside>

    <!-- Main content -->
    <main class="shell-content">
      <router-outlet />
    </main>
  </div>
</div>

<!-- Drawer móvil -->
<p-drawer
  [visible]="drawerVisible()"
  (visibleChange)="drawerVisible.set($event)"
  position="left"
  header="Menú"
>
  <nav class="sidebar-nav">
    @for (item of navItems; track item.route) {
      <a
        class="nav-item"
        [routerLink]="item.route"
        routerLinkActive="active"
        (click)="drawerVisible.set(false)"
      >
        <i [class]="item.icon"></i>
        <span>{{ item.label }}</span>
      </a>
    }
  </nav>
</p-drawer>
