<div class="page-container">
  <app-page-header title="Pagos" subtitle="Gestión de pagos del empleado" />

  @if (loading()) {
    <app-loading-spinner message="Cargando pagos..." />
  } @else if (error()) {
    <app-error-alert [message]="error()!" [retryable]="true" (retry)="loadPagos()" />
  } @else if (pagos().length === 0) {
    <app-empty-state
      title="Sin pagos"
      message="No se encontraron pagos registrados."
      icon="pi pi-wallet"
    />
  } @else {
    <p-table
      [value]="pagos()"
      [paginator]="true"
      [rows]="10"
      [rowsPerPageOptions]="[5, 10, 25]"
      [showGridlines]="false"
      styleClass="p-datatable-sm"
      stripedRows
    >
      <ng-template #header>
        <tr>
          <th pSortableColumn="concepto">Concepto <p-sortIcon field="concepto" /></th>
          <th pSortableColumn="monto">Monto <p-sortIcon field="monto" /></th>
          <th pSortableColumn="fecha">Fecha <p-sortIcon field="fecha" /></th>
          <th pSortableColumn="estado">Estado <p-sortIcon field="estado" /></th>
        </tr>
      </ng-template>
      <ng-template #body let-pago>
        <tr>
          <td>{{ pago.concepto }}</td>
          <td>{{ pago.monto | currency: 'COP' : 'symbol' : '1.0-0' }}</td>
          <td>{{ pago.fecha | date: 'dd/MM/yyyy' }}</td>
          <td>
            <p-tag [value]="pago.estado" [severity]="estadoSeverity(pago.estado)" />
          </td>
        </tr>
      </ng-template>
    </p-table>
  }
</div>
